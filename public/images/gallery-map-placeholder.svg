<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- PLACEHOLDER GALLERY MAP
       Replace this image using the "Upload Map Image" button on the
       Interactive Map page. Your uploaded image is stored in the browser
       (localStorage) and used as the base layer for hotspot placement.
       For a permanent copy, place your floor plan in /public/images/
       and reference it directly. -->
  <rect width="1600" height="1000" fill="#F8F8F8"/>
  <rect x="40" y="40" width="1520" height="920" fill="none" stroke="#E7E7E7" stroke-width="2"/>
  <text x="800" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#6B7280" letter-spacing="6">
    GALLERY MAP PLACEHOLDER
  </text>
  <text x="800" y="530" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6B7280" letter-spacing="2">
    Use "Upload Map Image" to add your own Korean Gallery floor plan
  </text>
</svg>
